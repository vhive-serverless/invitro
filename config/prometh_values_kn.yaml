alertmanager:
  config:
    route:
      group_by: ['job']
  serviceMonitor:
    interval: "15s"
  alertmanagerSpec:
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
          - matchExpressions:
            - key: loader-nodetype
              operator: In
              values:
              - monitoring
              - singlenode

grafana:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: loader-nodetype
            operator: In
            values:
            - monitoring
            - singlenode
  serviceMonitor:
    interval: "15s"
    scrapeTimeout: "15s" # Cannot be larger than Prometheus scrape intervals

kubeApiServer:
  serviceMonitor:
    interval: "5s"  # Reduced for control plane latency experiment
    metricRelabelings: []

kubelet:
  serviceMonitor:
    interval: "15s"
    cAdvisorMetricRelabelings: []

kubeControllerManager:
  service:
    targetPort: 10257
  serviceMonitor:
    interval: "15s"
    https: true
    insecureSkipVerify: true

coreDns:
  serviceMonitor:
    interval: "15s"

kubeEtcd:
  serviceMonitor:
    interval: "15s"

kubeScheduler:
  service:
    targetPort: 10259
  serviceMonitor:
    interval: "15s"
    https: true
    insecureSkipVerify: true

kubeProxy:
  serviceMonitor:
    interval: "5s"  # Reduced for control plane latency experiment

kube-state-metrics:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: loader-nodetype
            operator: In
            values:
            - monitoring
            - singlenode
  metricLabelsAllowlist:
    - pods=[*]
    - deployments=[app.kubernetes.io/name,app.kubernetes.io/component,app.kubernetes.io/instance]
  prometheus:
    monitor:
      interval: "5s"  # Reduced for control plane latency experiment

prometheus-node-exporter:
  service:
    listenOnAllInterfaces: false
  prometheus:
    monitor:
      interval: "15s"

prometheusOperator:
  admissionWebhooks:
    deployment:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                - key: loader-nodetype
                  operator: In
                  values:
                    - monitoring
                    - singlenode
    patch:
      resources:
        limits:
          cpu: 1
          memory: 5Gi
        requests:
          memory: 150Mi
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
          - matchExpressions:
            - key: loader-nodetype
              operator: In
              values:
              - monitoring
              - singlenode

  serviceMonitor:
    interval: "15s"
  resources:
    limits:
      cpu: 2
      memory: 5Gi
    requests:
      cpu: 100m
      memory: 100Mi
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: loader-nodetype
            operator: In
            values:
            - monitoring
            - singlenode

  prometheusConfigReloader:
    resources:
      requests:
        cpu: 200m
        memory: 50Mi
      limits:
        cpu: 1
        memory: 2Gi

prometheus:
  serviceMonitor:
    interval: "15s"

  prometheusSpec:
    maximumStartupDurationSeconds: 60
    scrapeInterval: "5s"  # Reduced for control plane latency experiment
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
          - matchExpressions:
            - key: loader-nodetype
              operator: In
              values:
              - monitoring
              - singlenode
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    walCompression: false
    resources:
      limits:
        cpu: 3
        memory: 10Gi  # Increased for higher scrape frequency
      requests:
        memory: 250Mi  # Increased for higher scrape frequency
    enableAdminAPI: true
