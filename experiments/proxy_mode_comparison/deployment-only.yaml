apiVersion: apps/v1
kind: Deployment
metadata:
  name: massive-scale-deployment
  namespace: default
spec:
  replicas: 5000  # Instantly request 5000 pods
  selector:
    matchLabels:
      app: fake-workload
  template:
    metadata:
      labels:
        app: fake-workload
    spec:
      # 1. AFFINITY: Force the scheduler to ONLY place these on your fake nodes
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: type
                operator: In
                values:
                - kwok
      # 2. TOLERATIONS: Allow the pods to bypass the fake node taints
      tolerations:
      - key: "kwok.x-k8s.io/node"
        operator: "Exists"
        effect: "NoSchedule"
      containers:
      - name: web
        image: nginx:alpine # KWOK won't actually pull this; it just fakes the "Running" status
        ports:
        - containerPort: 80
